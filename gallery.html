<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header placeholder -->

                                    <p class="card-text text-center">Campus View</p>
                                </div>
                            </div>
                        </div>
                    </div>
